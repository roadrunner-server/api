syntax = "proto3";

package http.v2;

import "http/v2/http.proto";

option go_package = "github.com/roadrunner-server/api-go/v6/http/v2;httpV2";
option php_metadata_namespace = "RoadRunner\\HTTP\\DTO\\V2\\GPBMetadata";
option php_namespace = "RoadRunner\\HTTP\\DTO\\V2";

message HttpHandlerRequest {
  string id = 1;
  string remote_addr = 2;
  string protocol = 3;
  string method = 4;
  string uri = 5;
  map<string, HttpHeaderValue> header = 6;
  map<string, HttpHeaderValue> cookies = 7;
  string raw_query = 8;
  bool parsed = 9;
  bytes uploads = 10;
  map<string, HttpHeaderValue> attributes = 11;
}

message HttpHandlerFetchRequest {
  int64 batch_size = 1;
}

message HttpHandlerRequests {
  repeated HttpHandlerRequest requests = 1;
}
